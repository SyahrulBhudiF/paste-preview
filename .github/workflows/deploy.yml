name: Deploy

on:
    push:
        branches: [master]
    workflow_dispatch:

concurrency:
    group: deploy-production
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 11.9.0

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check
              run: pnpm run check

            - name: Test
              run: pnpm run test:run

            - name: Verify Cloudflare token
              run: |
                  test -n "$CLOUDFLARE_API_TOKEN"
                  test -n "$CLOUDFLARE_ACCOUNT_ID"
                  curl --fail --silent --show-error \
                      --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                      "https://api.cloudflare.com/client/v4/user/tokens/verify" \
                      > /dev/null
                  curl --fail --silent --show-error \
                      --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                      "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID" \
                      > /dev/null
                  curl --fail --silent --show-error \
                      --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                      "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
                      > /dev/null
                  curl --fail --silent --show-error \
                      --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                      "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/alchemy-state-store/settings" \
                      > /dev/null
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

            - name: Deploy
              run: pnpm run deploy:ci
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

            - name: Verify production asset update
              run: |
                  curl --fail --silent --show-error https://preview.ryuko.my.id \
                      | grep --fixed-strings "min-w-0 w-full max-w-[1500px]"
